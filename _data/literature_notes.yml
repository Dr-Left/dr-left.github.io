- slug: deepseek-v4-million-token-context
  title: "DeepSeek-V4: Towards Highly Efficient Million-Token Context Intelligence (1)"
  source_url: "https://jingwei-zuo.notion.site/35f0d39fb5ca8055a9adee24a2c27e22"
  sections:
    - heading: "Quick Note"
      body: |
        **Core Methodology?**

        - Hybrid Attention (Compressed Sparse Attention + Heavily Compressed Attention)
        - Manifold-Constrained Hyper-Connections (mHC)
        - Muon Optimizer
        - Pretrain: >32T
        - Post-Train: Domain-specific experts then on-policy distillation (wherein the unified model acts as the student learning to optimize the reverse KL loss with teacher models)

        **Motivation**

        - Quadratic Attention is INEFFICIENT

        **Strenghts**

        - 27% of FLOPs and 10% of KV compared to Deepseek-V3.2

        **Core Architecture**

        - Still MoE
          - a single fused kernel for MoE modules that overlaps computation communication and memory access.
          - remove constraint of N_routing target nodes
          - Hash routing. (for initial layers)
        - Still MTP
        - mHC
          - 感觉很fancy的数学+实验验证对了就OK。这种constraint的insight成立的可能有千千万，但是实验成功与否不知道。能work就是好方法。
          - 说实话感觉kimi的attention residuals似乎更简介一点。这个看上去非常数学。
        - Hybrid Attention (CSA+HCA)
          - CSA: compresses the KV caches along the sequence dimension and then performs DeepSeek Sparse Attention (DSA)
          - 简单说来，就是把每m个token压缩成一个，然后再用lightning indexer挑选topk做最经典的multi-head attention计算。
          - 压缩的时候有两套预料（Ca, Cb），当前这个块压缩的hidden C_comp会看到当前当前block(m个token)的Ca，和前一个block （也是m个token）的Cb.
          - HCA: More aggressive to KV cache, but dense attention
          - m’ >> m,也就是说这里压缩更激进
          - 这里没有两套hidden做overlapped compression
          - 锐评：感觉dpsk对attention的设计屡屡非常激进。别家可能都觉得attention是bottleneck，那interleave一下linear和dense就完了，dpsk还对dense做了heavy conpression，然后sparse部分也是在DSA基础上再加了m→1的compression.
          - Sliding window attention: to preserve locality. (insight: after separating into blocks, the query cannot access information from other tokens within the same block)
          - 感觉就是heuristically要把该保留的信息通道保留，剩下的交给伟大的adam优化器去做。如果训练不稳定，再想想法子让它不那么容易发散，比如加入一些约束条件。(比如mHC)
          - Attention Sink integrated
        - Backend implementation:
          - TileLang
          - batch-invariant and deterministic kernel libraries
          - 严重怀疑dpsk设计这么复杂的kernel系统是为了debug硬件精度问题（华为昇腾听说经常数值结果会不稳定）。
          - FP4 quantization-aware training for MoE weights and the indexer QK path to reduce memory and computation
          - tensor-level checkpointing → fine-grained recomputation control; hybrid ZeRO for Muon, mHC implem via recomputation and fused kernels; two stage contextual parallelism
          - Inference: het-KV cache with on-disk storage for shared-prefix reuse.
