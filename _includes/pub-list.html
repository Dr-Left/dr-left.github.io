{% for pub in site.data.publications %}
<div class="pub-card" style="display: flex; flex-direction: column;">
  <div style="display: flex; align-items: center;">
    <div style="flex-shrink: 0; margin-right: 20px;">
      <img src="{{ pub.image }}" alt="{{ pub.image_alt }}" style="max-width: 300px;">
    </div>
    <div>
      <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">{{ pub.title }}</h3>
      <div style="font-size: 14px; margin-bottom: 10px;">{{ pub.authors }}</div>
      <div style="font-size: 14px; color: gray;">{{ pub.venue }}</div>
      <div class="pub-links" style="font-size: 14px; margin-top: 10px;">
        {% for link in pub.links %}
        <a href="{{ link.url }}">[{{ link.label }}]</a>
        {% endfor %}
      </div>
    </div>
  </div>
  {% if pub.abstract %}
  <div class="pub-abstract">{{ pub.abstract }}</div>
  {% endif %}
</div>
{% endfor %}
